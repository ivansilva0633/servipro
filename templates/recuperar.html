<!DOCTYPE html><html lang="pt-br"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ServiPro - Recuperar senha</title><style>
*{box-sizing:border-box;font-family:'Segoe UI',sans-serif;margin:0;padding:0}
body{background:linear-gradient(135deg,#2563eb,#1746c0);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}
.card{background:#fff;border-radius:22px;padding:32px 26px;max-width:380px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.2)}
h1{text-align:center;color:#1746c0;font-size:26px;margin-bottom:4px}
.sub{text-align:center;color:#8794a8;font-size:13px;margin-bottom:22px}
label{font-size:12px;font-weight:600;display:block;margin:12px 0 4px;color:#48566b}
input{width:100%;padding:12px;border:1px solid #e1e7f0;border-radius:11px;font-size:14px}
button{width:100%;margin-top:20px;padding:13px;border:none;border-radius:13px;background:linear-gradient(135deg,#2563eb,#1746c0);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.link{text-align:center;margin-top:16px;font-size:13px}.link a{color:#1746c0;font-weight:600;text-decoration:none}
.flash{background:#fef3c7;color:#92600e;padding:10px;border-radius:10px;font-size:13px;margin-bottom:12px;text-align:center}
</style></head><body><div class="card">
<h1>Recuperar senha</h1><p class="sub">Digite seu email e a nova senha</p>
{% with m=get_flashed_messages() %}{% if m %}<div class="flash">{{m[0]}}</div>{% endif %}{% endwith %}
<form method="post" action="/recuperar">
 <label>Email da conta</label><input name="email" type="email" placeholder="voce@email.com" required>
 <label>Nova senha</label><input name="nova_senha" type="password" placeholder="nova senha" required>
 <button>Redefinir senha</button>
</form>
<p class="link"><a href="/login">Voltar para o login</a></p>
</div></body></html>
